<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consent Form</title>
  </head>
  <body>
    <div class="aip">
      <h2>AIP</h2>
      <p>ID: <input type="text" required name="pid" class="det" /></p>
      <p>Email: <input type="email" required name="pemail" class="det" /></p>
      <p>Email: <input type="text" required name="pname" class="det" /></p>
    </div>
    <div class="uip">
      <h2>AIU</h2>
      <p>ID: <input type="text" required name="uid" class="det2" /></p>
      <p>Email: <input type="email" required name="uemail" class="det2" /></p>
      <p>Email: <input type="text" required name="uname" class="det2" /></p>
    </div>

    <div class="dp">
      <h2>Data Principal</h2>
      <p>ID: <input type="text" required name="dpid" class="det3" /></p>
      <!-- <p>ID Type: <input type="email" required name="dpemail" class="det3" ></p> -->
      <p>Name: <input type="text" required name="dpname" class="det3" /></p>
    </div>

    <div class="purpose">
      <h2>Purposes</h2>
      <input type="checkbox" id="p1" name="p1"/>
      <label for="p1">Agricultural credit(code B1)</label><br />
      <input type="checkbox" id="p2" name="p2" />
      <label for="p2">Insurance (code B2)</label><br />
      <input type="checkbox" id="p3" name="p3"/>
      <label for="p3">Logistics(code B3)</label><br />
      <input type="checkbox" id="p4" name="p4"/>
      <label for="p4">Storage-related services(code B4)</label><br />
      <input type="checkbox" id="p5" name="p5"/>
      <label for="p5">Market-related services(code B5)</label><br />
      <input type="checkbox" id="p6" name="p6"/>
      <label for="p6">Payment services(code B6)</label><br />
      <input type="checkbox" id="p7" name="p7"/>
      <label for="p7">Farm advisories(code P1)</label><br />
      <input type="checkbox" id="p8" name="p8"/>
      <label for="p8">Pest and disease management(code P2)</label><br />
      <input type="checkbox" id="p9" name="p9"/>
      <label for="p9">Water management(code P3)</label><br />
      <input type="checkbox" id="p10" name="p10"/>
      <label for="p10">Quality assurance(code p4)</label><br />
      <input type="checkbox" id="p11" name="p11"/>
      <label for="p11">Soil Health(code P5)</label><br />
      <input type="checkbox" id="p12" name="p12"/>
      <label for="p12">Benefits(code G1)</label><br />
      <input type="checkbox" id="p13" name="p13"/>
      <label for="p13">Research(code G2)</label><br />
      <input type="checkbox" id="p14" name="p14"/>
      <label for="p14">Innovation(code G3)</label><br />
      <input type="checkbox" id="p15" name="p15"/>
      <label for="p15">Education(code G4)</label><br />
      <input type="checkbox" id="p16" name="p16"/>
      <label for="p16">Data principal use(code G5)</label><br />
      
    </div>

    <div class="itd">
        <h2>Item Details</h2>
        <p>Item ID: <input type="text"></p>
        <!-- <p>Item Type: <input type="text"></p> -->
    </div>

    <div>
        <h2>Artifact Expriy</h2>
        <p>Expiry <input type="date" required></p>
    </div>
  </body>
</html>
